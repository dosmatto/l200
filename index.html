<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="L200">
<title>L200 Triton</title>
<style>
:root{--bg:#f5f5f5;--surface:#fff;--text:#1a1a1a;--text2:#666;--text3:#999;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--green:#1D9E75;--green-bg:#e1f5ee;--green-text:#0f6e56;--amber:#BA7517;--radius:12px;--rsm:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--surface:#1e1e1e;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--green-bg:#04342c;--green-text:#5dcaa5;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;}
.header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.header-title{font-size:18px;font-weight:600;}
.header-sub{font-size:12px;color:var(--text2);}
.tab-bar{display:flex;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2.5px solid transparent;font-family:inherit;transition:all .2s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.content{padding:16px;max-width:480px;margin:0 auto;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
.field input,.field select{width:100%;padding:13px 14px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rsm);font-size:16px;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--rsm);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
.btn-primary:active{opacity:.8;}
.btn-secondary{width:100%;padding:13px;background:transparent;color:var(--green);border:1.5px solid var(--green);border-radius:var(--rsm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}
.btn-secondary:active{opacity:.7;}
.btn-danger{width:100%;padding:13px;background:transparent;color:#e24b4a;border:1.5px solid #e24b4a;border-radius:var(--rsm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.metric{background:var(--surface);border-radius:var(--rsm);padding:14px;border:0.5px solid var(--border);}
.metric .mlabel{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.metric .mvalue{font-size:20px;font-weight:600;color:var(--text);line-height:1.1;}
.metric .munit{font-size:11px;color:var(--text2);font-weight:400;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-date{font-size:13px;font-weight:600;color:var(--text);}
.card-km{font-size:12px;color:var(--text2);margin-top:2px;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:0 0 0 8px;line-height:1;flex-shrink:0;}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;background:var(--green-bg);color:var(--green-text);font-weight:500;margin-bottom:10px;}
.card-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text2);padding:3px 0;border-bottom:0.5px solid var(--border);}
.card-row:last-child{border-bottom:none;}
.card-row span:last-child{color:var(--text);font-weight:500;}
.cons-good{color:var(--green)!important;}
.cons-bad{color:#e24b4a!important;}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.filter-row::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:13px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500;}
.fbtn.active{background:var(--green);color:#fff;border-color:var(--green);}
.chart-wrap{position:relative;width:100%;height:180px;margin-bottom:20px;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px;}
/* KM Diário */
.km-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.km-box-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text);}
.km-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.km-row:last-child{border-bottom:none;}
.km-row-label{color:var(--text2);}
.km-row-val{color:var(--text);font-weight:600;}
.km-total{font-size:15px;font-weight:700;color:var(--green);}
.photo-area{border:2px dashed var(--border2);border-radius:var(--rsm);padding:20px;text-align:center;cursor:pointer;margin-bottom:14px;background:var(--bg);}
.photo-area:active{opacity:.7;}
.photo-icon{font-size:32px;margin-bottom:8px;}
.photo-label{font-size:14px;color:var(--text2);}
.photo-sublabel{font-size:12px;color:var(--text3);margin-top:4px;}
.ai-loading{display:none;text-align:center;padding:16px;color:var(--text2);font-size:14px;}
.ai-loading.show{display:block;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.km-preview{background:var(--green-bg);border-radius:var(--rsm);padding:12px 16px;margin-bottom:14px;display:none;}
.km-preview.show{display:block;}
.km-preview-label{font-size:12px;color:var(--green-text);margin-bottom:4px;}
.km-preview-val{font-size:28px;font-weight:700;color:var(--green);}
.tipo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.tipo-btn{padding:12px;border-radius:var(--rsm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;}
.tipo-btn.active{border-color:var(--green);color:var(--green);background:var(--green-bg);}
#km-input-manual{display:none;}
#km-input-manual.show{display:block;}
.km-confirm-box{background:var(--green-bg);border:2px solid var(--green);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:4px;}
.km-confirm-label{font-size:12px;font-weight:600;color:var(--green-text);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;}
.km-confirm-input{width:100%;font-size:36px;font-weight:700;color:var(--green);background:transparent;border:none;border-bottom:2px solid var(--green);text-align:center;outline:none;padding:4px 0;font-family:inherit;}
.km-confirm-sub{font-size:11px;color:var(--green-text);margin-top:8px;opacity:.7;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div><div class="header-title">L200 Triton</div><div class="header-sub">SSF1I63 · Controle de frota</div></div>
    <div style="font-size:24px;">🛻</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('novo')">Abastecer</button>
    <button class="tab" onclick="showTab('km')">KM Diário</button>
    <button class="tab" onclick="showTab('historico')">Histórico</button>
    <button class="tab" onclick="showTab('stats')">Resumo</button>
  </div>
</div>

<div class="content">

<!-- ABA ABASTECER -->
<div id="sec-novo" class="section">
  <br>
  <div class="row2">
    <div class="field"><label>Data</label><input type="date" id="in-data"></div>
    <div class="field"><label>Hora</label><input type="time" id="in-hora"></div>
  </div>
  <div class="row2">
    <div class="field"><label>Litros</label><input type="number" id="in-litros" placeholder="56.00" step="0.01" min="0" inputmode="decimal"></div>
    <div class="field"><label>Preço / litro (R$)</label><input type="number" id="in-preco" placeholder="7.79" step="0.01" min="0" inputmode="decimal"></div>
  </div>
  <div class="row2">
    <div class="field"><label>KM atual</label><input type="number" id="in-km" placeholder="62633" min="0" inputmode="numeric"></div>
    <div class="field"><label>Combustível</label><input type="text" id="in-tipo" value="Diesel"></div>
  </div>
  <div class="field"><label>Posto (opcional)</label><input type="text" id="in-posto" placeholder="ex: Frisia"></div>
  <button class="btn-primary" onclick="salvarAbast()">✓ Registrar abastecimento</button>
</div>

<!-- ABA KM DIÁRIO -->
<div id="sec-km" class="section" style="display:none">
  <br>
  <div class="row2">
    <div class="field"><label>Data</label><input type="date" id="km-data"></div>
    <div class="field"><label>Hora</label><input type="time" id="km-hora"></div>
  </div>

  <!-- PASSO 1: FOTO -->
  <div id="km-step1">
    <div class="photo-area" onclick="document.getElementById('foto-input').click()">
      <div class="photo-icon">📷</div>
      <div class="photo-label">Tirar foto do velocímetro</div>
      <div class="photo-sublabel">O app lê o KM automaticamente</div>
    </div>
    <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none" onchange="processarFoto(this)">
    <div class="ai-loading" id="ai-loading"><span class="spinner"></span>Lendo velocímetro...</div>
    <button class="btn-secondary" onclick="toggleManual()" style="margin-top:0">✏️ Inserir KM manualmente</button>
    <div id="km-input-manual" style="display:none;margin-top:12px;">
      <div class="field">
        <label>KM do velocímetro</label>
        <input type="number" id="km-manual" placeholder="ex: 62633" inputmode="numeric" min="0" oninput="kmManualChanged()">
      </div>
    </div>
  </div>

  <!-- PASSO 2: CONFIRMAR (aparece após leitura) -->
  <div id="km-step2" style="display:none">
    <div class="km-confirm-box" id="km-confirm-box">
      <div class="km-confirm-label">KM lido do velocímetro</div>
      <input type="number" id="km-confirmado" class="km-confirm-input" inputmode="numeric" min="0">
      <div class="km-confirm-sub">Corrija se necessário</div>
    </div>
    <div class="field" style="margin-top:16px;"><label>Este KM é:</label></div>
    <div class="tipo-btns">
      <button class="tipo-btn active" id="btn-inicial" onclick="setTipo('inicial')">🌅 Inicial (saída)</button>
      <button class="tipo-btn" id="btn-final" onclick="setTipo('final')">🌆 Final (chegada)</button>
    </div>
    <button class="btn-primary" onclick="salvarKmDia()">✓ Confirmar e salvar</button>
    <button class="btn-secondary" onclick="resetKmStep()" style="margin-top:8px;">↩ Tirar outra foto</button>
  </div>

  <br>
  <div class="section-label">Registros do mês atual</div>
  <div id="km-lista"></div>
  <button class="btn-secondary" onclick="exportarKmExcel()" style="margin-top:4px;">⬇ Exportar Excel KM</button>
</div>

<!-- ABA HISTÓRICO -->
<div id="sec-historico" class="section" style="display:none">
  <br>
  <div class="filter-row" id="filter-row"></div>
  <div id="lista-hist"></div>
  <div style="margin-top:8px;"><button class="btn-secondary" onclick="exportarExcel()">⬇ Exportar Excel abastecimentos</button></div>
</div>

<!-- ABA RESUMO -->
<div id="sec-stats" class="section" style="display:none">
  <br>
  <div class="metric-grid" id="metrics-grid"></div>
  <div id="chart-section">
    <div class="section-label">Consumo (km/l)</div>
    <div class="chart-wrap"><canvas id="chart1" role="img" aria-label="Consumo km/l ao longo do tempo"></canvas></div>
    <div class="section-label">Gasto por abastecimento (R$)</div>
    <div class="chart-wrap"><canvas id="chart2" role="img" aria-label="Gasto em reais por abastecimento"></canvas></div>
    <div class="section-label">Preço do litro (R$)</div>
    <div class="chart-wrap"><canvas id="chart3" role="img" aria-label="Evolução do preço por litro"></canvas></div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['novo','km','historico','stats'][i]===t));
  ['novo','km','historico','stats'].forEach(id=>document.getElementById('sec-'+id).style.display=id===t?'block':'none');
  if(t==='historico'){buildFilters();renderHist();}
  if(t==='stats')renderStats();
  if(t==='km')renderKmLista();
}

// ======= ABASTECER =======
function salvarAbast(){
  const data=document.getElementById('in-data').value;
  const hora=document.getElementById('in-hora').value||_hora;
  const litros=parseFloat(document.getElementById('in-litros').value);
  const preco=parseFloat(document.getElementById('in-preco').value);
  const km=parseInt(document.getElementById('in-km').value);
  const tipo=document.getElementById('in-tipo').value||'Diesel';
  const posto=document.getElementById('in-posto').value;
  if(!data||isNaN(litros)||isNaN(preco)||isNaN(km)){showToast('⚠️ Preencha data, litros, preço e KM');return;}
  const prev=[...records].sort((a,b)=>a.km-b.km).filter(r=>r.km<km).pop();
  const consumo=prev?(km-prev.km)/litros:null;
  records.push({id:Date.now(),data,hora,litros,preco,km,tipo,posto,consumo});
  records.sort((a,b)=>a.km-b.km);
  save();
  showToast('✓ Abastecimento salvo!');
  ['in-litros','in-preco','in-km','in-posto'].forEach(id=>document.getElementById(id).value='');
  const nn=new Date();
  document.getElementById('in-data').value=nn.toISOString().split('T')[0];
  document.getElementById('in-hora').value=nn.toTimeString().slice(0,5);
}

// ======= KM DIÁRIO =======
function setTipo(t){
  tipoKm=t;
  document.getElementById('btn-inicial').classList.toggle('active',t==='inicial');
  document.getElementById('btn-final').classList.toggle('active',t==='final');
}

function toggleManual(){
  const el=document.getElementById('km-input-manual');
  const visible=el.style.display!=='none';
  el.style.display=visible?'none':'block';
  if(!visible)document.getElementById('km-manual').focus();
}

function kmManualChanged(){
  const v=parseInt(document.getElementById('km-manual').value);
  if(!isNaN(v)&&v>1000) mostrarStep2(v);
}

function mostrarStep2(km){
  kmLidoFoto=km;
  document.getElementById('km-confirmado').value=km;
  document.getElementById('km-step1').style.display='none';
  document.getElementById('km-step2').style.display='block';
}

function resetKmStep(){
  kmLidoFoto=null;
  document.getElementById('km-step1').style.display='block';
  document.getElementById('km-step2').style.display='none';
  document.getElementById('km-manual').value='';
  document.getElementById('km-input-manual').style.display='none';
  document.getElementById('foto-input').value='';
  document.getElementById('ai-loading').classList.remove('show');
}

async function processarFoto(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  document.getElementById('ai-loading').classList.add('show');
  kmLidoFoto=null;
  try{
    const imgUrl=URL.createObjectURL(file);
    const result=await Tesseract.recognize(imgUrl,'eng',{
      tessedit_char_whitelist:'0123456789',
      tessedit_pageseg_mode:'6'
    });
    URL.revokeObjectURL(imgUrl);
    const txt=result.data.text.replace(/\s/g,'');
    const nums=txt.match(/\d{4,6}/g);
    let best=null;
    if(nums){
      const lastKm=records.length?records[records.length-1].km:50000;
      best=nums.map(n=>parseInt(n)).filter(n=>n>1000&&n<999999)
        .sort((a,b)=>Math.abs(a-lastKm)-Math.abs(b-lastKm))[0]||null;
    }
    document.getElementById('ai-loading').classList.remove('show');
    if(best){
      mostrarStep2(best);
      showToast('✓ KM lido: '+best.toLocaleString('pt-BR')+' — confirme abaixo');
    } else {
      showToast('⚠️ Não consegui ler. Insira manualmente.');
      document.getElementById('km-input-manual').style.display='block';
      document.getElementById('km-manual').focus();
    }
  }catch(err){
    document.getElementById('ai-loading').classList.remove('show');
    showToast('⚠️ Erro na leitura. Insira manualmente.');
    document.getElementById('km-input-manual').style.display='block';
  }
}

function salvarKmDia(){
  const data=document.getElementById('km-data').value;
  const hora=document.getElementById('km-hora').value||new Date().toTimeString().slice(0,5);
  // Pega o valor da caixa de confirmação (pode ter sido editado)
  const kmFinal=parseInt(document.getElementById('km-confirmado').value||'0');
  if(!data||!kmFinal||kmFinal<1000){showToast('⚠️ Informe o KM');return;}
  kmRecords=kmRecords.filter(r=>!(r.data===data&&r.tipo===tipoKm));
  kmRecords.push({id:Date.now(),data,hora,km:kmFinal,tipo:tipoKm});
  kmRecords.sort((a,b)=>a.data.localeCompare(b.data)||a.tipo.localeCompare(b.tipo));
  saveKm();
  showToast('✓ KM '+tipoKm+' salvo: '+kmFinal.toLocaleString('pt-BR'));
  resetKmStep();
  const nn=new Date();
  document.getElementById('km-data').value=nn.toISOString().split('T')[0];
  document.getElementById('km-hora').value=nn.toTimeString().slice(0,5);
  setTipo('inicial');
  renderKmLista();
}

function renderKmLista(){
  const el=document.getElementById('km-lista');
  const mesAtual=new Date().toISOString().slice(0,7);
  // Agrupar por data
  const doMes=kmRecords.filter(r=>r.data.startsWith(mesAtual));
  const byDay={};
  doMes.forEach(r=>{if(!byDay[r.data])byDay[r.data]={};byDay[r.data][r.tipo]=r.km;});
  const dias=Object.keys(byDay).sort();
  if(!dias.length){el.innerHTML='<div class="empty">Nenhum KM registrado este mês.</div>';return;}
  let totalRodado=0;
  let html='';
  dias.forEach((d,i)=>{
    const ini=byDay[d].inicial||null;
    const fin=byDay[d].final||null;
    const rod=(ini&&fin)?fin-ini:null;
    if(rod)totalRodado+=rod;
    const [y,m,day]=d.split('-');
    html+=`<div class="km-box">
      <div class="km-box-title">${day}/${m}/${y}</div>
      <div class="km-row"><span class="km-row-label">KM Inicial</span><span class="km-row-val">${ini?ini.toLocaleString('pt-BR'):'—'}</span></div>
      <div class="km-row"><span class="km-row-label">KM Final</span><span class="km-row-val">${fin?fin.toLocaleString('pt-BR'):'—'}</span></div>
      <div class="km-row"><span class="km-row-label">Rodados</span><span class="km-row-val ${rod?'cons-good':''}">${rod?rod+' km':'—'}</span></div>
      <button class="del-btn" style="margin-top:8px;font-size:13px;color:var(--text3);" onclick="delKmDia('${d}')">× excluir dia</button>
    </div>`;
  });
  html+=`<div class="km-box" style="border-color:var(--green);">
    <div class="km-row"><span class="km-row-label" style="font-weight:700;">TOTAL KM RODADOS NO MÊS</span><span class="km-row-val km-total">${totalRodado.toLocaleString('pt-BR')} km</span></div>
  </div>`;
  el.innerHTML=html;
}

function delKmDia(data){
  if(!confirm('Excluir registros de KM do dia '+data+'?'))return;
  kmRecords=kmRecords.filter(r=>r.data!==data);
  saveKm();renderKmLista();
}

function exportarKmExcel(){
  const mesAtual=new Date().toISOString().slice(0,7);
  const doMes=kmRecords.filter(r=>r.data.startsWith(mesAtual));
  const byDay={};
  doMes.forEach(r=>{if(!byDay[r.data])byDay[r.data]={};byDay[r.data][r.tipo]=r.km;});
  const dias=Object.keys(byDay).sort();
  if(!dias.length){showToast('Nenhum KM para exportar');return;}

  const [ano,mes]=mesAtual.split('-');
  const nomesMes={'01':'Janeiro','02':'Fevereiro','03':'Março','04':'Abril','05':'Maio','06':'Junho','07':'Julho','08':'Agosto','09':'Setembro','10':'Outubro','11':'Novembro','12':'Dezembro'};
  const nomeMes=(nomesMes[mes]||mes)+'/'+ano;

  const aoa=[];
  aoa.push(['','','KM','','']);
  aoa.push(['DATA','INICIAL','FINAL','RODADOS']);
  let total=0;
  dias.forEach(d=>{
    const ini=byDay[d].inicial||null;
    const fin=byDay[d].final||null;
    const rod=(ini&&fin)?fin-ini:null;
    if(rod)total+=rod;
    const [y,m,day]=d.split('-');
    aoa.push([day+'/'+m+'/'+y, ini||'', fin||'', rod||0]);
  });
  // linhas em branco até 20
  for(let i=dias.length;i<15;i++)aoa.push(['','','',0]);
  aoa.push([]);
  aoa.push(['TOTAL DE KM RODADOS:','','',total]);

  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:14},{wch:12},{wch:12},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,nomeMes);
  downloadExcel(wb,'KM_L200_'+mesAtual+'.xlsx');
  showToast('Excel KM gerado!');
}

// ======= HISTÓRICO =======
function buildFilters(){
  const years=[...new Set(records.map(r=>r.data.slice(0,4)))].sort().reverse();
  document.getElementById('filter-row').innerHTML=['Todos',...years].map(y=>
    `<button class="fbtn${activeFilter===y?' active':''}" onclick="setFilter('${y}')">${y}</button>`
  ).join('');
}
function setFilter(y){activeFilter=y;buildFilters();renderHist();}
function renderHist(){
  const el=document.getElementById('lista-hist');
  const sorted=[...records].sort((a,b)=>b.km-a.km);
  const filtered=activeFilter==='Todos'?sorted:sorted.filter(r=>r.data.startsWith(activeFilter));
  if(!filtered.length){el.innerHTML='<div class="empty">Nenhum registro.</div>';return;}
  el.innerHTML=filtered.map(r=>{
    const total=(r.litros*r.preco).toFixed(2);
    const cons=r.consumo?r.consumo.toFixed(2)+' km/l':'—';
    const lkm=r.consumo?(1/r.consumo).toFixed(3)+' l/km':'—';
    const cc=r.consumo?(r.consumo>=AVG_CONS?'cons-good':'cons-bad'):'';
    return `<div class="card">
      <div class="card-header">
        <div><div class="card-date">${fmtDate(r.data)}${r.hora?' · '+r.hora:''}</div><div class="card-km">${r.km.toLocaleString('pt-BR')} km</div></div>
        <button class="del-btn" onclick="delAbast(${r.id})">×</button>
      </div>
      <span class="badge">${r.tipo}${r.posto?' · '+r.posto:''}</span>
      <div class="card-row"><span>Litros</span><span>${r.litros.toFixed(2)} l</span></div>
      <div class="card-row"><span>Preço/litro</span><span>R$ ${r.preco.toFixed(2)}</span></div>
      <div class="card-row"><span>Total pago</span><span>R$ ${total}</span></div>
      <div class="card-row"><span>Consumo</span><span class="${cc}">${cons}</span></div>
      <div class="card-row"><span>Litros/km</span><span>${lkm}</span></div>
    </div>`;
  }).join('');
}
function delAbast(id){
  if(!confirm('Excluir este abastecimento?'))return;
  records=records.filter(r=>r.id!==id);
  save();buildFilters();renderHist();
}

// ======= EXPORT ABASTECIMENTO =======
function exportarExcel(){
  const sorted=[...records].sort((a,b)=>a.km-b.km);
  const filtered=activeFilter==='Todos'?sorted:sorted.filter(r=>r.data.startsWith(activeFilter));
  if(!filtered.length){showToast('Nenhum registro para exportar');return;}
  const periodo=activeFilter==='Todos'?'Completo':activeFilter;
  const meses={'01':'Janeiro','02':'Fevereiro','03':'Março','04':'Abril','05':'Maio','06':'Junho','07':'Julho','08':'Agosto','09':'Setembro','10':'Outubro','11':'Novembro','12':'Dezembro'};
  const wb=XLSX.utils.book_new();
  const byMonth={};
  filtered.forEach(r=>{const k=r.data.slice(0,7);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(r);});
  Object.keys(byMonth).sort().forEach(mesKey=>{
    const[ano,mes]=mesKey.split('-');
    const nomeMes=(meses[mes]||mes)+' '+ano;
    const rows=byMonth[mesKey];
    const totalValor=rows.reduce((a,r)=>a+r.litros*r.preco,0);
    const totalLitros=rows.reduce((a,r)=>a+r.litros,0);
    const kmInicio=rows[0].km;
    const kmFim=rows[rows.length-1].km;
    const aoa=[];
    aoa.push(['ABASTECIMENTOS']);
    aoa.push([nomeMes+' — L200 Triton SSF1I63']);
    aoa.push([]);
    aoa.push(['DATA','VALOR','','LITROS','R$/L','','KM','KM/L','L/km']);
    aoa.push(['','','','','','',kmInicio,'','']);
    rows.forEach(r=>{
      const[y,m,d]=r.data.split('-');
      const kml=r.consumo?parseFloat(r.consumo.toFixed(2)):null;
      const lkm=r.consumo?parseFloat((1/r.consumo).toFixed(2)):null;
      aoa.push([d+'/'+m,'R$',parseFloat((r.litros*r.preco).toFixed(2)),parseFloat(r.litros.toFixed(3)),'R$',parseFloat(r.preco.toFixed(2)),r.km,kml,lkm]);
    });
    aoa.push([]);
    aoa.push(['TOTAL','R$',parseFloat(totalValor.toFixed(2)),parseFloat(totalLitros.toFixed(2)),'','',kmFim,'','']);
    aoa.push(['KM rodados','','','','','',kmFim-kmInicio,'','']);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:10},{wch:5},{wch:10},{wch:10},{wch:5},{wch:8},{wch:10},{wch:8},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws,nomeMes.slice(0,31));
  });
  downloadExcel(wb,'Abastecimento_L200_'+periodo+'.xlsx');
  showToast('Excel gerado!');
}

// ======= RESUMO =======
function renderStats(){
  const grid=document.getElementById('metrics-grid');
  const withCons=records.filter(r=>r.consumo!==null&&r.consumo<15);
  if(records.length<2){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--text3);font-size:14px;">Poucos registros.</div>';return;}
  const totalL=records.reduce((a,r)=>a+r.litros,0);
  const totalGasto=records.reduce((a,r)=>a+r.litros*r.preco,0);
  const avgPreco=records.reduce((a,r)=>a+r.preco,0)/records.length;
  const avgCons=withCons.reduce((a,r)=>a+r.consumo,0)/withCons.length;
  const kmMax=Math.max(...records.map(r=>r.km));
  const kmMin=Math.min(...records.map(r=>r.km));
  const kmTotal=kmMax-kmMin;
  const dates=records.map(r=>new Date(r.data)).sort((a,b)=>a-b);
  const meses=(dates[dates.length-1]-dates[0])/(1000*60*60*24*30.44)||1;
  const kmMes=Math.round(kmTotal/meses);
  const gastoMes=totalGasto/meses;
  grid.innerHTML=`
    <div class="metric"><div class="mlabel">Média consumo</div><div class="mvalue">${avgCons.toFixed(2)}<span class="munit"> km/l</span></div></div>
    <div class="metric"><div class="mlabel">Litros por km</div><div class="mvalue">${(1/avgCons).toFixed(3)}<span class="munit"> l/km</span></div></div>
    <div class="metric"><div class="mlabel">Total gasto</div><div class="mvalue" style="font-size:16px">R$ ${totalGasto.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    <div class="metric"><div class="mlabel">Preço médio/l</div><div class="mvalue">R$ ${avgPreco.toFixed(2)}</div></div>
    <div class="metric"><div class="mlabel">Total litros</div><div class="mvalue">${totalL.toFixed(0)}<span class="munit"> l</span></div></div>
    <div class="metric"><div class="mlabel">KM rodados</div><div class="mvalue">${kmTotal.toLocaleString('pt-BR')}<span class="munit"> km</span></div></div>
    <div class="metric"><div class="mlabel">Média km/mês</div><div class="mvalue">${kmMes.toLocaleString('pt-BR')}<span class="munit"> km</span></div></div>
    <div class="metric"><div class="mlabel">Gasto/mês</div><div class="mvalue" style="font-size:16px">R$ ${gastoMes.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
  `;
  drawCharts(withCons,records);
}
function drawCharts(wc,all){
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const tc=isDark?'#888':'#999';const gc=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
  const step=Math.ceil(wc.length/30);
  const sc=wc.filter((_,i)=>i%step===0);const sa=all.filter((_,i)=>i%step===0);
  const opts=(ex={})=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:8},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},...(ex.yt||{})},grid:{color:gc}}}});
  if(c1)c1.destroy();if(c2)c2.destroy();if(c3)c3.destroy();
  c1=new Chart(document.getElementById('chart1'),{type:'line',data:{labels:sc.map(r=>fmtShort(r.data)),datasets:[{data:sc.map(r=>+r.consumo.toFixed(2)),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,.1)',tension:.3,fill:true,pointRadius:2,pointBackgroundColor:'#1D9E75'}]},options:opts()});
  c2=new Chart(document.getElementById('chart2'),{type:'bar',data:{labels:sc.map(r=>fmtShort(r.data)),datasets:[{data:sc.map(r=>+(r.litros*r.preco).toFixed(2)),backgroundColor:'rgba(186,117,23,.7)',borderRadius:3}]},options:opts({yt:{callback:v=>'R$'+v}})});
  c3=new Chart(document.getElementById('chart3'),{type:'line',data:{labels:sa.map(r=>fmtShort(r.data)),datasets:[{data:sa.map(r=>+r.preco.toFixed(2)),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,.1)',tension:.3,fill:true,pointRadius:2,pointBackgroundColor:'#378ADD'}]},options:opts({yt:{callback:v=>'R$'+v}})});
}

function downloadExcel(wb,fname){
  try{
    // Try native writeFile first (works on desktop)
    XLSX.writeFile(wb,fname);
  }catch(e){
    // Fallback for Safari iOS - use blob + anchor
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wbout],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  }
}

function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function fmtShort(d){if(!d)return'';const[,m,day]=d.split('-');return`${day}/${m}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
</script>
