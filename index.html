<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Abastecimento">
<title>Abastecimento L200</title>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --text: #1a1a1a;
    --text2: #666666;
    --text3: #999999;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --green: #1D9E75;
    --green-bg: #e1f5ee;
    --green-text: #0f6e56;
    --amber: #BA7517;
    --amber-bg: #faeeda;
    --blue-bg: #e6f1fb;
    --blue-text: #185fa5;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111111;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666666;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --green-bg: #04342c;
      --green-text: #5dcaa5;
      --amber-bg: #412402;
      --blue-bg: #042c53;
      --blue-text: #85b7eb;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
  
  /* Header */
  .header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 16px 16px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .header-title { font-size: 18px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text2); }
  .truck-icon { font-size: 24px; }
  .tab-bar { display: flex; gap: 0; }
  .tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); border-bottom: 2.5px solid transparent; font-family: inherit; transition: all 0.2s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* Content */
  .content { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Form */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; }
  .field input { width: 100%; padding: 13px 14px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 16px; color: var(--text); font-family: inherit; outline: none; -webkit-appearance: none; }
  .field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-primary { width: 100%; padding: 15px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 6px; transition: opacity 0.15s; }
  .btn-primary:active { opacity: 0.8; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

  /* Metrics */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .metric { background: var(--surface); border-radius: var(--radius-sm); padding: 14px; border: 0.5px solid var(--border); }
  .metric .mlabel { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .metric .mvalue { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.1; }
  .metric .munit { font-size: 11px; color: var(--text2); font-weight: 400; }

  /* Cards */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-date { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-km { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; padding: 0 0 0 8px; line-height: 1; flex-shrink: 0; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: var(--green-bg); color: var(--green-text); font-weight: 500; margin-bottom: 10px; }
  .card-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text2); padding: 3px 0; border-bottom: 0.5px solid var(--border); }
  .card-row:last-child { border-bottom: none; }
  .card-row span:last-child { color: var(--text); font-weight: 500; }
  .cons-good { color: var(--green) !important; }
  .cons-bad { color: #e24b4a !important; }

  /* Filter */
  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .filter-row::-webkit-scrollbar { display: none; }
  .fbtn { flex-shrink: 0; padding: 6px 14px; border-radius: 99px; font-size: 13px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: inherit; font-weight: 500; }
  .fbtn.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* Charts */
  .chart-wrap { position: relative; width: 100%; height: 180px; margin-bottom: 20px; }
  
  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 11px 22px; border-radius: 99px; font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Abastecimento</div>
      <div class="header-sub">L200 Triton · SSF1I63</div>
    </div>
    <div class="truck-icon">🛻</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('novo')">Abastecer</button>
    <button class="tab" onclick="showTab('historico')">Histórico</button>
    <button class="tab" onclick="showTab('stats')">Resumo</button>
  </div>
</div>

<div class="content">

  <!-- NOVO -->
  <div id="sec-novo" class="section">
    <br>
    <div class="row2">
      <div class="field">
        <label>Data</label>
        <input type="date" id="in-data">
      </div>
      <div class="field">
        <label>Hora</label>
        <input type="time" id="in-hora">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Litros</label>
        <input type="number" id="in-litros" placeholder="56.00" step="0.01" min="0" inputmode="decimal">
      </div>
      <div class="field">
        <label>Preço / litro (R$)</label>
        <input type="number" id="in-preco" placeholder="7.79" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>KM atual</label>
        <input type="number" id="in-km" placeholder="62633" min="0" inputmode="numeric">
      </div>
      <div class="field">
        <label>Combustível</label>
        <input type="text" id="in-tipo" value="Diesel">
      </div>
    </div>
    <div class="field">
      <label>Posto (opcional)</label>
      <input type="text" id="in-posto" placeholder="ex: Frisia">
    </div>
    <button class="btn-primary" onclick="salvarAbast()">✓ Registrar abastecimento</button>
  </div>

  <!-- HISTÓRICO -->
  <div id="sec-historico" class="section" style="display:none">
    <br>
    <div class="filter-row" id="filter-row"></div>
    <div id="lista-hist"></div>
  </div>

  <!-- STATS -->
  <div id="sec-stats" class="section" style="display:none">
    <br>
    <div class="metric-grid" id="metrics-grid"></div>
    <div id="chart-section">
      <div class="section-label">Consumo (km/l)</div>
      <div class="chart-wrap"><canvas id="chart1" role="img" aria-label="Consumo km/l ao longo do tempo"></canvas></div>
      <div class="section-label">Gasto por abastecimento (R$)</div>
      <div class="chart-wrap"><canvas id="chart2" role="img" aria-label="Gasto em reais por abastecimento"></canvas></div>
      <div class="section-label">Preço do litro (R$)</div>
      <div class="chart-wrap"><canvas id="chart3" role="img" aria-label="Evolução do preço por litro"></canvas></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

let records = JSON.parse(localStorage.getItem('l200v1') || 'null');
if (!records) { records = IMPORTED; localStorage.setItem('l200v1', JSON.stringify(records)); }

let activeFilter = 'Todos';
let c1=null, c2=null, c3=null;
const AVG_CONS = 8.2;

const _now = new Date();
document.getElementById('in-data').value = _now.toISOString().split('T')[0];
document.getElementById('in-hora').value = _now.toTimeString().slice(0,5);

function save() { localStorage.setItem('l200v1', JSON.stringify(records)); }

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['novo','historico','stats'][i]===t));
  ['novo','historico','stats'].forEach(id => document.getElementById('sec-'+id).style.display = id===t?'block':'none');
  if(t==='historico'){buildFilters();renderHist();}
  if(t==='stats') renderStats();
}

function salvarAbast() {
  const data=document.getElementById('in-data').value;
  const hora=document.getElementById('in-hora').value || new Date().toTimeString().slice(0,5);
  const litros=parseFloat(document.getElementById('in-litros').value);
  const preco=parseFloat(document.getElementById('in-preco').value);
  const km=parseInt(document.getElementById('in-km').value);
  const tipo=document.getElementById('in-tipo').value||'Diesel';
  const posto=document.getElementById('in-posto').value;
  if(!data||isNaN(litros)||isNaN(preco)||isNaN(km)){showToast('⚠️ Preencha data, litros, preço e KM');return;}
  const prev=[...records].sort((a,b)=>a.km-b.km).filter(r=>r.km<km).pop();
  const consumo=prev?(km-prev.km)/litros:null;
  records.push({id:Date.now(),data,hora,litros,preco,km,tipo,posto,consumo});
  records.sort((a,b)=>a.km-b.km);
  save();
  showToast('✓ Abastecimento salvo!');
  ['in-litros','in-preco','in-km','in-posto'].forEach(id=>document.getElementById(id).value='');
  const n=new Date();
  document.getElementById('in-data').value=n.toISOString().split('T')[0];
  document.getElementById('in-hora').value=n.toTimeString().slice(0,5);
}

function buildFilters() {
  const years=[...new Set(records.map(r=>r.data.slice(0,4)))].sort().reverse();
  document.getElementById('filter-row').innerHTML=['Todos',...years].map(y=>
    `<button class="fbtn${activeFilter===y?' active':''}" onclick="setFilter('${y}')">${y}</button>`
  ).join('');
}

function setFilter(y){activeFilter=y;buildFilters();renderHist();}

function renderHist() {
  const el=document.getElementById('lista-hist');
  const sorted=[...records].sort((a,b)=>b.km-a.km);
  const filtered=activeFilter==='Todos'?sorted:sorted.filter(r=>r.data.startsWith(activeFilter));
  if(!filtered.length){el.innerHTML='<div class="empty">Nenhum registro encontrado.</div>';return;}
  el.innerHTML=filtered.map(r=>{
    const total=(r.litros*r.preco).toFixed(2);
    const cons=r.consumo?r.consumo.toFixed(2)+' km/l':'—';
    const lkm=r.consumo?(1/r.consumo).toFixed(3)+' l/km':'—';
    const consClass=r.consumo?(r.consumo>=AVG_CONS?'cons-good':'cons-bad'):'';
    return `<div class="card">
      <div class="card-header">
        <div><div class="card-date">${fmtDate(r.data)}${r.hora ? ' · '+r.hora : ''}</div><div class="card-km">${r.km.toLocaleString('pt-BR')} km</div></div>
        <button class="del-btn" onclick="del(${r.id})">×</button>
      </div>
      <span class="badge">${r.tipo}${r.posto?' · '+r.posto:''}</span>
      <div class="card-row"><span>Litros</span><span>${r.litros.toFixed(2)} l</span></div>
      <div class="card-row"><span>Preço/litro</span><span>R$ ${r.preco.toFixed(2)}</span></div>
      <div class="card-row"><span>Total pago</span><span>R$ ${total}</span></div>
      <div class="card-row"><span>Consumo</span><span class="${consClass}">${cons}</span></div>
      <div class="card-row"><span>Litros/km</span><span>${lkm}</span></div>
    </div>`;
  }).join('');
}

function del(id){
  if(!confirm('Excluir este registro?'))return;
  records=records.filter(r=>r.id!==id);
  save();buildFilters();renderHist();
}

function renderStats() {
  const grid=document.getElementById('metrics-grid');
  const withCons=records.filter(r=>r.consumo!==null&&r.consumo<15);
  const totalL=records.reduce((a,r)=>a+r.litros,0);
  const totalGasto=records.reduce((a,r)=>a+r.litros*r.preco,0);
  const avgPreco=records.reduce((a,r)=>a+r.preco,0)/records.length;
  const avgCons=withCons.reduce((a,r)=>a+r.consumo,0)/withCons.length;
  const kmMax=Math.max(...records.map(r=>r.km));
  const kmMin=Math.min(...records.map(r=>r.km));
  const kmTotal=kmMax-kmMin;
  const dates=records.map(r=>new Date(r.data)).sort((a,b)=>a-b);
  const meses=(dates[dates.length-1]-dates[0])/(1000*60*60*24*30.44)||1;
  const kmMes=Math.round(kmTotal/meses);
  const lMes=(totalL/meses).toFixed(1);
  const gastoMes=(totalGasto/meses);
  grid.innerHTML=`
    <div class="metric"><div class="mlabel">Média consumo</div><div class="mvalue">${avgCons.toFixed(2)}<span class="munit"> km/l</span></div></div>
    <div class="metric"><div class="mlabel">Litros por km</div><div class="mvalue">${(1/avgCons).toFixed(3)}<span class="munit"> l/km</span></div></div>
    <div class="metric"><div class="mlabel">Total gasto</div><div class="mvalue" style="font-size:16px">R$ ${totalGasto.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    <div class="metric"><div class="mlabel">Preço médio/l</div><div class="mvalue">R$ ${avgPreco.toFixed(2)}</div></div>
    <div class="metric"><div class="mlabel">Total litros</div><div class="mvalue">${totalL.toFixed(0)}<span class="munit"> l</span></div></div>
    <div class="metric"><div class="mlabel">KM rodados</div><div class="mvalue">${kmTotal.toLocaleString('pt-BR')}<span class="munit"> km</span></div></div>
    <div class="metric"><div class="mlabel">Média km/mês</div><div class="mvalue">${kmMes.toLocaleString('pt-BR')}<span class="munit"> km</span></div></div>
    <div class="metric"><div class="mlabel">Gasto/mês</div><div class="mvalue" style="font-size:16px">R$ ${gastoMes.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
  `;
  drawCharts(withCons,records);
}

function drawCharts(withCons,all) {
  const isDark=matchMedia('(prefers-color-scheme: dark)').matches;
  const tc=isDark?'#888':'#999';
  const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const step=Math.ceil(withCons.length/30);
  const sc=withCons.filter((_,i)=>i%step===0);
  const sa=all.filter((_,i)=>i%step===0);
  const lc=sc.map(r=>fmtShort(r.data));
  const la=sa.map(r=>fmtShort(r.data));
  const opts=(extra={})=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:8},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11},...(extra.ytick||{})},grid:{color:gc},...(extra.yscale||{})}}, ...extra.extra});
  if(c1)c1.destroy();
  if(c2)c2.destroy();
  if(c3)c3.destroy();
  c1=new Chart(document.getElementById('chart1'),{type:'line',data:{labels:lc,datasets:[{data:sc.map(r=>+r.consumo.toFixed(2)),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.1)',tension:0.3,fill:true,pointRadius:2,pointBackgroundColor:'#1D9E75'}]},options:opts()});
  c2=new Chart(document.getElementById('chart2'),{type:'bar',data:{labels:lc,datasets:[{data:sc.map(r=>+(r.litros*r.preco).toFixed(2)),backgroundColor:'rgba(186,117,23,0.7)',borderRadius:3}]},options:opts({ytick:{callback:v=>'R$'+v}})});
  c3=new Chart(document.getElementById('chart3'),{type:'line',data:{labels:la,datasets:[{data:sa.map(r=>+r.preco.toFixed(2)),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.1)',tension:0.3,fill:true,pointRadius:2,pointBackgroundColor:'#378ADD'}]},options:opts({ytick:{callback:v=>'R$'+v}})});
}

function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function fmtShort(d){if(!d)return'';const[,m,day]=d.split('-');return`${day}/${m}`;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
